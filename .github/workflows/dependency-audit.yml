name: Dependency Audit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high
