name: Frontend Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: npm audit (critical)
        run: npm audit --omit=dev --audit-level=critical
